name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Windows (NSIS .exe) ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install
        env:
          HUSKY: 0

      - name: Setup Python runtime
        shell: bash
        run: bash scripts/setup-python-runtime.sh

      - name: Remove Git usr/bin from PATH (conflicts with MSVC linker)
        shell: powershell
        run: |
          $cleanPath = ($env:Path.Split(';') | Where-Object { $_ -notlike "*Git\usr\bin*" }) -join ';'
          echo "PATH=$cleanPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Tauri app
        shell: cmd
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abu-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ─── macOS (x64 DMG) ─────────────────────────────────────────────
  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: x86_64-apple-darwin

      - name: Install dependencies
        run: npm install
        env:
          HUSKY: 0

      - name: Setup Python runtime
        run: bash scripts/setup-python-runtime.sh

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build --target x86_64-apple-darwin --bundles dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abu-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  # ─── macOS (Apple Silicon DMG) ───────────────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: aarch64-apple-darwin

      - name: Install dependencies
        run: npm install
        env:
          HUSKY: 0

      - name: Setup Python runtime
        run: bash scripts/setup-python-runtime.sh

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abu-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
